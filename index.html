<!DOCTYPE html>
<!--
  EHCU Rule Navigator
  Version 1.2
  Created by Kosei Omasa
-->
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>EHCU Rule Navigator Version 1.2</title>
<style>
:root{
  --bg:#06172c;--bg2:#0a315f;--panel:#f8fbff;--text:#0b1220;--muted:#5d6f86;--line:#d8e3f0;--navy:#003b71;
  --green:#eaf8ef;--green-b:#74cf91;--green-s:#167744;
  --yellow:#fff7d8;--yellow-b:#f0ce50;--yellow-s:#8a6500;
  --orange:#fff0df;--orange-b:#f1a85d;--orange-s:#b25600;
  --purple:#f2eefe;--purple-b:#b7a2ef;--purple-s:#5c3bb6;
  --blue:#eaf4ff;--blue-b:#9bc8f6;--blue-s:#0961a8;
  --gray:#f1f4f8;--gray-b:#c8d2df;--gray-s:#58677a;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg2),var(--bg) 28rem,#07101f);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;letter-spacing:0}
button,select{font:inherit}
button{touch-action:manipulation}
.app{width:min(760px,100%);margin:0 auto;padding:12px 12px 28px}
.top{position:sticky;top:0;z-index:10;margin:-1px -12px 12px;padding:12px;background:rgba(6,23,44,.9);border-bottom:1px solid rgba(255,255,255,.12);backdrop-filter:saturate(160%) blur(18px)}
.brand{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;color:#fff}
.hospital{margin:0 0 3px;color:#c8dafa;font-size:12px;line-height:1.35;font-weight:800}
.title{margin:0;font-size:26px;line-height:1.04;font-weight:950}
.version{border:1px solid rgba(255,255,255,.34);border-radius:999px;color:#eaf3ff;padding:6px 10px;font-size:12px;font-weight:900;white-space:nowrap}
.home-title{margin:0 0 8px;color:#fff;font-size:18px;font-weight:900}
.home-sub{margin:0 0 14px;color:#d6e6f8;font-size:13px;line-height:1.65;font-weight:700}
.panel{background:rgba(248,251,255,.97);border:1px solid rgba(216,227,240,.88);border-radius:22px;padding:16px;box-shadow:0 18px 44px rgba(3,17,34,.22)}
.panel+.panel{margin-top:12px}
.stack,.choice-grid,.steps,.legend,.cards{display:grid;gap:10px}
.choice-grid.two{grid-template-columns:1fr 1fr}
.btn{min-height:58px;width:100%;border:1px solid rgba(255,255,255,.14);border-radius:16px;background:#fff;color:#0a2342;padding:14px 16px;font-size:17px;line-height:1.25;font-weight:900;text-align:left;box-shadow:0 8px 22px rgba(6,23,44,.10)}
.btn.primary{min-height:76px;background:linear-gradient(180deg,#fff,#f3f8ff);border-color:#c9d9ec;font-size:20px}
.btn.dark{background:var(--navy);color:#fff}
.btn.small{min-height:46px;padding:10px 12px;font-size:14px;text-align:center}
.btn:active{transform:translateY(1px)}
.nav-row{display:flex;justify-content:space-between;gap:10px;margin:12px 0 0}.nav-row .btn{width:auto;min-width:112px;box-shadow:none}
.selection{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 12px}
.pill{border:1px solid #cbd8e6;border-radius:999px;background:#fff;color:#31445e;padding:7px 10px;font-size:12px;font-weight:850}
.step-head{margin:0 0 8px;color:#52657a;font-size:13px;line-height:1.5;font-weight:900}
.step-title{margin:0 0 12px;color:#06172c;font-size:24px;line-height:1.25;font-weight:950}
.select-card{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px}
.select-card label{display:block;margin:0 0 9px;color:#233751;font-size:15px;font-weight:950}
select{width:100%;min-height:58px;border:1px solid #b9c9dc;border-radius:14px;background:#fff;color:#0b1220;padding:0 14px;font-size:17px;font-weight:850}
.result{border:1px solid var(--line);border-left-width:8px;border-radius:18px;padding:14px;background:#fff}
.result+.result{margin-top:10px}
.result.green{background:var(--green);border-color:var(--green-b);border-left-color:var(--green-s)}
.result.yellow{background:var(--yellow);border-color:var(--yellow-b);border-left-color:var(--yellow-s)}
.result.orange{background:var(--orange);border-color:var(--orange-b);border-left-color:var(--orange-s)}
.result.purple{background:var(--purple);border-color:var(--purple-b);border-left-color:var(--purple-s)}
.result.blue{background:var(--blue);border-color:var(--blue-b);border-left-color:var(--blue-s)}
.result.gray{background:var(--gray);border-color:var(--gray-b);border-left-color:var(--gray-s)}
.result-kicker{margin:0 0 5px;color:#4b5d74;font-size:12px;font-weight:900}
.result-title{margin:0;font-size:23px;line-height:1.25;font-weight:950}
.result-list{display:grid;gap:8px;margin:12px 0 0;padding:0;list-style:none}
.result-list li{position:relative;padding-left:18px;color:#1f3148;font-size:15px;line-height:1.55;font-weight:800}
.result-list li:before{content:"";position:absolute;left:1px;top:.68em;width:7px;height:7px;border-radius:999px;background:currentColor;opacity:.56}
.notice{border:1px solid #f0ce50;border-radius:16px;background:#fff9e8;color:#61470a;padding:12px;font-size:14px;line-height:1.55;font-weight:900;margin:10px 0}
.step-card{display:grid;grid-template-columns:42px 1fr;gap:11px;align-items:start;border:1px solid #d8e3f0;border-radius:18px;background:#fff;padding:12px}
.num{display:grid;place-items:center;width:42px;height:42px;border-radius:999px;background:var(--navy);color:#fff;font-size:17px;font-weight:950}
.step-card h3{margin:0 0 5px;color:#0b1220;font-size:18px;line-height:1.35;font-weight:950}
.step-card p{margin:0;color:#52657a;font-size:13px;line-height:1.55;font-weight:750}
.legend-item{display:flex;align-items:center;gap:8px;color:#334155;font-size:12px;line-height:1.35;font-weight:800}
.swatch{width:18px;height:18px;border-radius:6px;border:1px solid var(--line);flex:0 0 auto}
.swatch.green{background:var(--green);border-color:var(--green-b)}.swatch.yellow{background:var(--yellow);border-color:var(--yellow-b)}.swatch.orange{background:var(--orange);border-color:var(--orange-b)}
.swatch.purple{background:var(--purple);border-color:var(--purple-b)}.swatch.blue{background:var(--blue);border-color:var(--blue-b)}.swatch.gray{background:var(--gray);border-color:var(--gray-b)}
.rulebook{display:grid;gap:12px}
.rule-section{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px}
.rule-section h2{margin:0 0 9px;color:#06172c;font-size:20px;line-height:1.3;font-weight:950}
.rule-section h3{margin:12px 0 6px;color:#18304f;font-size:16px;line-height:1.35;font-weight:950}
.rule-section ul,.rule-section ol{margin:8px 0 0;padding-left:22px;color:#24364f;font-size:14px;line-height:1.65;font-weight:750}
.rule-note{border-left:6px solid var(--navy);border-radius:14px;background:#eef6ff;padding:12px;color:#1d3858;font-size:14px;line-height:1.6;font-weight:850}
.footer{margin:16px 0 0;color:#c8dafa;font-size:11px;text-align:center;font-weight:800}
.hidden{display:none!important}
@media(max-width:430px){
  .app{padding:10px 10px 24px}.top{margin:-1px -10px 10px;padding:10px}.brand{grid-template-columns:1fr}.version{justify-self:start}.title{font-size:24px}
  .panel{border-radius:20px;padding:14px}.step-title{font-size:22px}.btn.primary{min-height:70px}.choice-grid.two{grid-template-columns:1fr}
}
</style>
</head>
<body>
<main class="app">
  <header class="top">
    <div class="brand">
      <div>
        <p class="hospital">済生会横浜市東部病院<br>救命救急センター</p>
        <h1 class="title">EHCU Rule Navigator</h1>
      </div>
      <div class="version">Version 1.2</div>
    </div>
  </header>

  <section id="home">
    <h2 class="home-title">使うフローを選択</h2>
    <p class="home-sub">EHCU入室時・転科時・Dr.callを、院内運用ルールに沿って確認します。</p>
    <div class="stack">
      <button class="btn primary" data-start="admission">EHCU入室時フロー</button>
      <button class="btn primary" data-start="transfer">転科時フロー</button>
      <button class="btn primary" data-start="drcall">EHCU看護師向けDr.callフロー</button>
      <button class="btn primary" data-start="rules">ルール参照</button>
    </div>
  </section>

  <section id="appPanel" class="panel hidden" aria-live="polite">
    <div id="selected" class="selection"></div>
    <div id="results"></div>
    <div id="question"></div>
    <div id="extraSteps"></div>
    <div class="nav-row">
      <button id="backBtn" class="btn small" type="button">戻る</button>
      <button id="homeBtn" class="btn small dark" type="button">最初に戻る</button>
    </div>
  </section>

  <section class="panel">
    <h2 class="step-title">色の凡例</h2>
    <div class="legend">
      <div class="legend-item"><span class="swatch green"></span>緑：NEWS低値・一般病棟優先検討</div>
      <div class="legend-item"><span class="swatch yellow"></span>黄色：EHCU入室検討</div>
      <div class="legend-item"><span class="swatch orange"></span>オレンジ：総合内科ルート</div>
      <div class="legend-item"><span class="swatch purple"></span>紫：他科入室・他科転科・内科輪番直接ルート</div>
      <div class="legend-item"><span class="swatch blue"></span>青：救急科主科ルート</div>
      <div class="legend-item"><span class="swatch gray"></span>グレー：EHCU内転科対象外・転棟時転科</div>
    </div>
  </section>

  <footer class="footer">Created by Kosei Omasa</footer>
</main>

<script>
const gmDiseases=["誤嚥性肺炎","尿路感染症","胃腸炎（細菌性・感染性）","敗血症・菌血症","社会的入院","膠原病","血液疾患","貧血（消化管出血を除く）","アレルギー性疾患","蜂窩織炎・うっ滞性皮膚炎","横紋筋融解","該当なし"];
const departments=["循環器内科","脳神経内科","消化器内科","腎臓内科","呼吸器内科","糖尿病内分泌内科","脳神経外科","消化器外科","泌尿器科","血管外科","心臓血管外科","救急科","その他"];
const internalRota=["循環器内科","脳神経内科","消化器内科","腎臓内科","呼吸器内科","糖尿病内分泌内科"];
const drCallDepartments=["総合内科",...departments];
const newsOptions=["NEWS＜4","NEWS≧4"];
const timeOptions=["平日日勤","夜間・休日"];
const eicuOptions=["EICU加療歴なし","EICU加療歴あり"];
const sceneOptions=["EHCU入室時","EHCU内転科後"];
const noNightTransfer=["泌尿器科","血管外科","心臓血管外科"];
const state={screen:"home",history:[],admission:{},transfer:{},drcall:{}};
const $=id=>document.getElementById(id);

function resetFlow(flow){state.screen=flow;state.history=[];state.admission={};state.transfer={};state.drcall={};render()}
function snapshot(){return JSON.stringify({screen:state.screen,admission:state.admission,transfer:state.transfer,drcall:state.drcall})}
function restore(data){const r=JSON.parse(data);state.screen=r.screen;state.admission=r.admission;state.transfer=r.transfer;state.drcall=r.drcall||{}}
function remember(){state.history.push(snapshot())}
function goHome(){state.screen="home";state.history=[];state.admission={};state.transfer={};state.drcall={};render()}
function back(){const last=state.history.pop();if(!last){goHome();return}restore(last);render()}
function isGm(v){return v&&v!=="該当なし"}
function selectedPills(items){return items.filter(Boolean).map(i=>`<span class="pill">${i}</span>`).join("")}
function resultCard(tone,title,items,kicker="判定結果"){return `<section class="result ${tone}"><p class="result-kicker">${kicker}</p><h2 class="result-title">${title}</h2><ul class="result-list">${items.map(i=>`<li>${i}</li>`).join("")}</ul></section>`}
function notice(text){return `<div class="notice">${text}</div>`}
function buttonQuestion(title,area,key,options,sub=""){
  return `<section><p class="step-head">${sub}</p><h2 class="step-title">${title}</h2><div class="choice-grid two">${options.map(o=>`<button class="btn" type="button" data-set="${area}:${key}:${o}">${o}</button>`).join("")}</div></section>`;
}
function selectQuestion(title,area,key,options,sub=""){
  const choices=options.map(o=>`<option value="${o}">${o}</option>`).join("");
  return `<section class="select-card"><p class="step-head">${sub}</p><h2 class="step-title">${title}</h2><label for="${area}-${key}">選択してください</label><select id="${area}-${key}" data-select="${area}:${key}"><option value="">未選択</option>${choices}</select></section>`;
}
function numberedSteps(title,steps){return `<section class="panel" style="margin-top:12px"><h2 class="step-title">${title}</h2><div class="steps">${steps.map((s,i)=>`<article class="step-card"><div class="num">${i+1}</div><div><h3>${s.title}</h3>${s.text?`<p>${s.text}</p>`:""}</div></article>`).join("")}</div></section>`}
function listText(items){return items.join(" / ")}
function setValue(area,key,value){
  if(!value)return;
  remember();
  state[area][key]=value;
  if(area==="admission"){
    if(key==="news"){state.admission.disease=null;state.admission.time=null;state.admission.gmBranch=null;state.admission.rotaDept=null;state.admission.dept=null}
    if(key==="disease"){state.admission.time=null;state.admission.gmBranch=null;state.admission.rotaDept=null;state.admission.dept=null}
    if(key==="time"){state.admission.gmBranch=null;state.admission.rotaDept=null}
    if(key==="gmBranch"){state.admission.rotaDept=null}
    if(key==="dept"){state.admission.time=null}
  }
  if(area==="transfer"){
    if(key==="disease"){state.transfer.time=null;state.transfer.eicu=null;state.transfer.dept=null}
    if(key==="time"){state.transfer.eicu=null}
    if(key==="dept"){state.transfer.time=null}
  }
  if(area==="drcall"){
    if(key==="scene"){state.drcall.time=null;state.drcall.dept=null}
    if(key==="time"){state.drcall.dept=null}
  }
  render();
}

function admissionNightItems(dept){
  if(dept==="循環器内科")return["Heart line当直医師よりEHCUリーダー看護師へ連絡","EHCUリーダー看護師からEICU当直医師へ連絡し最終判断","循環器内科主科でEHCU入院","Dr.callはHeart line当直医師"];
  if(dept==="消化器外科")return["ER医師または消化器外科医師よりEHCUリーダー看護師へ連絡","EHCUリーダー看護師からEICU当直医師へ連絡し最終判断","消化器外科主科でEHCU入院","Dr.callはER当直医師または消化器外科医師"];
  if(dept==="脳神経内科")return["Stroke line当直医師よりEHCUリーダー看護師へ連絡","EHCUリーダー看護師からEICU当直医師へ連絡し最終判断","脳神経内科主科でEHCU入院","Dr.callはStroke line当直医師"];
  if(dept==="脳神経外科")return["Stroke line当直医師よりEHCUリーダー看護師へ連絡","EHCUリーダー看護師からEICU当直医師へ連絡し最終判断","脳神経外科主科でEHCU入院","Dr.callはStroke line当直医師"];
  if(["消化器内科","腎臓内科","呼吸器内科","糖尿病内分泌内科"].includes(dept))return["EHCU病棟番医師よりEHCUリーダー看護師へ連絡","EHCUリーダー看護師からEICU当直医師へ連絡し最終判断",`${dept}主科でEHCU入院`,"Dr.callはEHCU病棟番医師"];
  if(noNightTransfer.includes(dept))return[`${dept}医師に相談し承諾を得て、${dept}主科で入院`,`${dept}医師またはER医師よりEHCUリーダー看護師へ連絡`,"EHCUリーダー看護師からEICU当直医師へ連絡し最終判断",`${dept}主科でEHCU入院`,`Dr.callは${dept}医師`];
  if(dept==="救急科")return["ER当直医師よりEHCUリーダー看護師へ連絡","EHCUリーダー看護師からEICU当直医師へ連絡し最終判断","救急科主科でEHCU入院","Dr.callはER当直医師"];
  return[`${dept}主科でEHCU入院`,"Dr.callはCall指示に従う"];
}

function commonTransferSteps(time,dept){
  if(time==="平日日勤"){
    return numberedSteps("EHCU内転科成立時の共通STEP：平日日勤",[
      {title:"転科先へ依頼"},{title:"直接電話またはLINE WORKSで情報共有"},{title:"救急科で電子カルテ上の主科・主治医変更"},{title:"救急科で重症指示簿を消去"},{title:"転科先が一般病棟用指示簿へ書き換え"},{title:"転科先がドクターコール順序を記載"}
    ]);
  }
  if(noNightTransfer.includes(dept)){
    return resultCard("gray","夜間・休日のEHCU内転科対象外",["泌尿器科・血管外科・心臓血管外科への夜間・休日転科は行わない","原則として翌平日日勤帯に転科先へ相談する","夜間・休日には新規のDr.call順序は設定しない"]);
  }
  const map=nightTransferCall(dept);
  return resultCard(map.tone,map.title,map.items,"EHCU内転科成立時の共通STEP：夜間・休日");
}
function nightTransferCall(dept){
  if(["総合内科","消化器内科","腎臓内科","呼吸器内科","糖尿病内分泌内科"].includes(dept))return{tone:"purple",title:"Dr.call：EHCU病棟番医師",items:["EHCU病棟番医師に連絡","救急科で電子カルテ上の主科・主治医変更","救急科で重症指示簿を消去","EHCU病棟番医師が一般病棟用指示簿へ書き換え","翌平日日勤帯に転科先がドクターコール順序を記載"]};
  if(dept==="循環器内科")return{tone:"purple",title:"Dr.call：Heart line当直医師",items:["Heart line当直医師に連絡","救急科で電子カルテ上の主科・主治医変更","救急科で重症指示簿を消去","Heart line当直医師が一般病棟用指示簿へ書き換え","Heart line当直医師がドクターコール順序を記載"]};
  if(["脳神経内科","脳神経外科"].includes(dept))return{tone:"purple",title:"Dr.call：Stroke line当直医師",items:["Stroke line当直医師に連絡","救急科で電子カルテ上の主科・主治医変更","救急科で重症指示簿を消去","Stroke line当直医師が一般病棟用指示簿へ書き換え","Stroke line当直医師がドクターコール順序を記載"]};
  if(dept==="消化器外科")return{tone:"purple",title:"Dr.call：ER当直医師",items:["ER当直医師に連絡","救急科で電子カルテ上の主科・主治医変更","救急科で重症指示簿を消去","ER当直医師が一般病棟用指示簿へ書き換え","ER当直医師がドクターコール順序を記載"]};
  if(dept==="救急科")return{tone:"blue",title:"Dr.call：ER当直医師",items:["ER当直医師に連絡","救急科で電子カルテ上の主科・主治医変更","救急科で重症指示簿を消去","ER当直医師が一般病棟用指示簿へ書き換え","ER当直医師がドクターコール順序を記載"]};
  return{tone:"purple",title:"Dr.call：Call指示に従う",items:["転科先へ連絡","救急科で電子カルテ上の主科・主治医変更","救急科で重症指示簿を消去","Dr.call順序を確認する"]};
}

function drCallAdmissionNight(dept){
  if(dept==="循環器内科")return{title:"Dr.call：Heart line当直医師",items:["循環器内科主科でEHCU入院","Dr.callはHeart line当直医師"]};
  if(["脳神経内科","脳神経外科"].includes(dept))return{title:"Dr.call：Stroke line当直医師",items:[`${dept}主科でEHCU入院`,"Dr.callはStroke line当直医師"]};
  if(dept==="消化器外科")return{title:"Dr.call：ER当直医師または消化器外科医師",items:["消化器外科主科でEHCU入院","Dr.callはER当直医師または消化器外科医師"]};
  if(["消化器内科","腎臓内科","呼吸器内科","糖尿病内分泌内科"].includes(dept))return{title:"Dr.call：EHCU病棟番医師",items:["選択科主科でEHCU入院","Dr.callはEHCU病棟番医師"]};
  if(noNightTransfer.includes(dept))return{title:"Dr.call：選択科医師",items:["選択科主科でEHCU入院","Dr.callは選択科医師"]};
  if(dept==="救急科")return{title:"Dr.call：ER当直医師",items:["救急科主科でEHCU入院","Dr.callはER当直医師"]};
  return{title:"Dr.call：Call指示に従う",items:[`${dept}主科でEHCU入院`,"Dr.callはCall指示に従う"]};
}

function renderRules(){
  return{selected:selectedPills(["ルール参照"]),results:"",extra:"",q:`
  <section class="rulebook">
    <div class="rule-note">EHCU入室時・転科時・Dr.callについて、誰へ連絡し、次に何をするかを確認する院内運用専用ナビゲーターです。</div>
    <section class="rule-section"><h2>Version 1.2の要点</h2><ul><li>トップ画面はEHCU入室時フロー、転科時フロー、EHCU看護師向けDr.callフロー、ルール参照。</li><li>EICU加療歴は「あり」「なし」の2択。現在地ではなく、EICU加療歴で判定する。</li><li>救急科とその他は別ルートとして扱う。</li><li>泌尿器科・血管外科・心臓血管外科への夜間・休日転科は行わない。</li></ul></section>
    <section class="rule-section"><h2>総合内科対象疾患</h2><ul><li>${gmDiseases.join("、")}。</li></ul></section>
    <section class="rule-section"><h2>主科・転科先</h2><ul><li>${departments.join("、")}。</li><li>救急科は明示的に救急科主科を選択するルート。その他は該当主科がないため、いったん救急科主科で入室し、転科時フローに従うルート。</li></ul></section>
    <section class="rule-section"><h2>色分け</h2><ul><li>緑：NEWS低値・一般病棟優先検討</li><li>黄色：EHCU入室検討</li><li>オレンジ：総合内科ルート</li><li>紫：他科入室・他科転科・内科輪番直接ルート</li><li>青：救急科主科ルート</li><li>グレー：EHCU内転科対象外・転棟時転科</li></ul></section>
    <section class="rule-section"><h2>NEWS判定</h2><ul><li>NEWS＜4：一般病棟をまず考慮し、急変リスク・モニタリング必要性を再評価する。</li><li>NEWS≧4：EHCU入室を検討し、総合内科対象疾患の判定へ進む。</li></ul></section>
    <section class="rule-section"><h2>夜間・休日転科なしの診療科</h2><ul><li>泌尿器科、血管外科、心臓血管外科。</li><li>原則として翌平日日勤帯に転科先へ相談し、夜間・休日には新規のDr.call順序は設定しない。</li></ul></section>
    <section class="rule-section"><h2>EHCU看護師向けDr.callフロー</h2><ul><li>場面、時間帯、主科または転科先に応じてDr.call対象を確認する。</li><li>夜間・休日の総合内科・消化器内科・腎臓内科・呼吸器内科・糖尿病内分泌内科はEHCU病棟番医師ルート。</li><li>救急科主科のDr.callはER当直医師。</li></ul></section>
    <section class="rule-section"><h2>転棟時転科ルート</h2><ul><li>内因性疾患は内科輪番の順番通り振り分け、外科系・マイナー疾患はそれぞれの科へ相談する。</li><li>転棟可能となった時点で、転棟後主科へ直接電話またはLINE WORKSで情報共有する。</li></ul></section>
  </section>`};
}

function render(){
  const isHome=state.screen==="home";
  $("home").classList.toggle("hidden",!isHome);
  $("appPanel").classList.toggle("hidden",isHome);
  if(isHome)return;
  const data=state.screen==="admission"?renderAdmission():state.screen==="transfer"?renderTransfer():state.screen==="drcall"?renderDrCall():renderRules();
  $("selected").innerHTML=data.selected;
  $("question").innerHTML=data.q;
  $("results").innerHTML=data.results;
  $("extraSteps").innerHTML=data.extra;
}
document.addEventListener("click",event=>{
  const start=event.target.closest("[data-start]");
  if(start){resetFlow(start.dataset.start);return}
  const set=event.target.closest("[data-set]");
  if(set){const [area,key,...rest]=set.dataset.set.split(":");setValue(area,key,rest.join(":"))}
});
document.addEventListener("change",event=>{
  const target=event.target.closest("[data-select]");
  if(!target)return;
  const [area,key]=target.dataset.select.split(":");
  setValue(area,key,target.value);
});
$("backBtn").addEventListener("click",back);
$("homeBtn").addEventListener("click",goHome);
render();
</script>
